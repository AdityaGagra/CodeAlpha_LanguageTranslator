<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌐 Language Translator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>🌐 Language Translation Tool</h1>
    <p class="subtitle">Translate text instantly between languages </p>

    <div class="language-bar">
      <select id="sourceLang">
        <option value="en">English</option>
        <option value="hi">Hindi</option>
        <option value="fr">French</option>
        <option value="es">Spanish</option>
        <option value="de">German</option>
        <option value="ja">Japanese</option>
        <option value="zh">Chinese</option>
        <option value="ar">Arabic</option>
        <option value="ru">Russian</option>
        <option value="pt">Portuguese</option>
      </select>

      <button id="swapBtn" title="Swap languages">🔄</button>

      <select id="targetLang">
        <option value="hi">Hindi</option>
        <option value="en">English</option>
        <option value="fr">French</option>
        <option value="es">Spanish</option>
        <option value="de">German</option>
        <option value="ja">Japanese</option>
        <option value="zh">Chinese</option>
        <option value="ar">Arabic</option>
        <option value="ru">Russian</option>
        <option value="pt">Portuguese</option>
      </select>
    </div>

    <div class="text-boxes">
      <div class="box">
        <textarea id="inputText" placeholder="Type something here... "></textarea>
        <div class="box-footer">
          <span id="charCount">0 characters</span>
        </div>
      </div>

      <div class="box">
        <textarea id="outputText" placeholder="After translation result...." readonly></textarea>
        <div class="box-footer">
          <button id="copyBtn" title="Copy translation">Copy</button>
          <button id="speakBtn" title="Listen to translation"> Speak</button>
        </div>
      </div>
    </div>

    <button id="translateBtn">Translate </button>

    <p id="statusMsg"></p>

    <footer>
      Made by Aditya | CodeAlpha Internship — Task 1
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
